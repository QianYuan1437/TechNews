name: 每日科技新闻更新

on:
  schedule:
    # 北京时间每天早 8:00 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取今日新闻
        run: python scripts/fetch_news.py

      - name: 生成静态网站
        run: python scripts/generate_site.py

      - name: 提交数据和网站文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "📰 自动更新：$(date -u '+%Y-%m-%d') 科技日报"
          git push

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
